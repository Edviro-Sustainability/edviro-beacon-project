<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Beacon Project by Edviro Energy: a selective summer fellowship for ambitious high schoolers driving sustainability and energy transparency in their schools."
    />
    <meta name="theme-color" content="#2e7d32" />
    <meta property="og:title" content="The Beacon Project | Edviro" />
    <meta
      property="og:description"
      content="A summer sustainability fellowship for ambitious high schoolers, presented by Edviro Energy."
    />
    <title>The Beacon Project | Edviro</title>
  </head>
  <body>
    <!--
      Hidden static form so Netlify's build-time HTML scanner registers the
      "beacon-application" form. The Vue-rendered form on /apply submits to "/"
      with these same field names (multipart, since it includes a file upload);
      submissions appear in the Netlify dashboard under Forms.
    -->
    <form
      name="beacon-application"
      netlify
      netlify-honeypot="bot-field"
      enctype="multipart/form-data"
      hidden
    >
      <input type="text" name="full_name" />
      <input type="email" name="email" />
      <input type="text" name="school" />
      <input type="text" name="grade" />
      <input type="text" name="location" />
      <input type="text" name="track" />
      <textarea name="why_essay"></textarea>
      <textarea name="track_essay"></textarea>
      <input type="file" name="resume" />
    </form>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
